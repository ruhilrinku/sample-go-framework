version: v2
managed:
  enabled: true
  disable:
    - module: buf.build/googleapis/googleapis
plugins:
  - local: protoc-gen-go
    out: gen/pb
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/pb
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: gen/pb
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
inputs:
  - directory: proto
    exclude_paths:
      - google
